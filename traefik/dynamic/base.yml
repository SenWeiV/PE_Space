http:
  routers:
    # /api → FastAPI 后端
    backend:
      rule: "PathPrefix(`/api`)"
      service: backend-svc
      priority: 10

    # / → React 前端（兜底）
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend-svc
      priority: 1

  services:
    backend-svc:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    frontend-svc:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
